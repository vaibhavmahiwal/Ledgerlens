---
# 1. Prepare the system
- name: Install prerequisite packages
  apt:
    name: 
      - apt-transport-https
      - ca-certificates
      - curl
      - software-properties-common
      - python3-pip
      - git  # Added: Necessary to pull your code
    state: present
    update_cache: yes

- name: Add Docker GPG key
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add Docker Repository
  apt_repository:
    repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
    state: present

- name: Install Docker Engine
  apt:
    name: docker-ce
    state: present

# CRITICAL: Install the Python library Ansible needs to run Docker commands
- name: Install Docker SDK for Python
  pip:
    name: docker
    state: present

# 2. Setup LedgerLens Project
- name: Create project directory
  file:
    path: /opt/ledgerlens
    state: directory
    owner: ubuntu
    group: ubuntu

# NEW: Pull your actual code from GitHub
- name: Pull LedgerLens source code from GitHub
  git:
    repo: 'https://github.com/vaibhavmahiwal/Ledgerlens.git'
    dest: /opt/ledgerlens
    force: yes  # Overwrites changes on server if you push new code to GitHub

- name: Copy docker-compose.yml to server
  copy:
    src: docker-compose.yml
    dest: /opt/ledgerlens/deployment/docker-compose.yml

- name: Ensure .env file is present
  template:
    src: env.j2
    dest: /opt/ledgerlens/backend/.env # Path must match where your Dockerfile looks

# 3. Orchestration
- name: Start services using Docker Compose
  community.docker.docker_compose_v2:
    project_src: /opt/ledgerlens/deployment # Path to where the compose file is
    state: present
    build: always 

