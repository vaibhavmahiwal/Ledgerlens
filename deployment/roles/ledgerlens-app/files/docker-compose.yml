version: '3.8'

services:
  api:
    build: 
      context: ../backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/ledgerlens
      - REDIS_URL=redis://redis:6379
      - GROQ_API_KEY=${GROQ_API_KEY} # Adding it here too if API needs AI access
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ../backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/ledgerlens
      - REDIS_URL=redis://redis:6379
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      - redis
      - postgres

  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ledgerlens
    # Ports removed for security; only accessible internally by api/worker
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes
    # Ports removed for security
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: